<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick All Doc Pro</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7650854652135464" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div id="main-menu" class="p-4">
        <h1 class="text-2xl font-bold text-center mb-6 text-blue-400">Quick All Doc Pro</h1>
        <div class="max-w-md mx-auto space-y-4">
            <div class="bg-white text-black p-4 rounded-lg shadow-lg border-l-8 border-blue-600">
                <h3 class="font-bold text-lg text-blue-600">📄 Resume Builder</h3>
                <p class="text-sm text-gray-600 mb-4">Build your professional CV in minutes.</p>
                <button onclick="showForm()" class="bg-blue-600 text-white px-4 py-2 rounded w-full font-bold">Create Resume</button>
            </div>
            <p class="text-center text-gray-500 text-xs mt-4 italic">More tools coming soon!</p>
        </div>
    </div>

    <div id="form-section" class="hidden p-4 max-w-md mx-auto">
        <button onclick="showMenu()" class="text-blue-400 mb-4 font-bold underline">← Back to Menu</button>
        <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
            <h2 class="text-xl font-bold mb-4">Enter Resume Details</h2>
            <div class="space-y-3">
                <input type="text" id="resName" placeholder="Your Full Name" class="w-full p-2 rounded text-black font-bold">
                <input type="text" id="resEdu" placeholder="Education (e.g. 12th, Degree)" class="w-full p-2 rounded text-black">
                <textarea id="resExp" placeholder="Work Experience / Skills" class="w-full p-2 rounded text-black h-24"></textarea>
                <button onclick="printResume()" class="bg-green-600 text-white px-4 py-2 rounded w-full font-bold">Generate & Save PDF</button>
            </div>
        </div>
    </div>

    <script>
        function showForm() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
        }
        function showMenu() {
            document.getElementById('form-section').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }
        function printResume() {
            let n = document.getElementById('resName').value;
            let e = document.getElementById('resEdu').value;
            let ex = document.getElementById('resExp').value;
            if(!n) { alert('Please enter name'); return; }
            let pr = window.open('', '', 'height=600,width=800');
            pr.document.write('<html><head><title>Resume</title><style>body{font-family:sans-serif;padding:40px;}h1{color:#2563eb;border-bottom:2px solid #2563eb;}h3{margin-top:20px;}</style></head><body>');
            pr.document.write('<h1>RESUME</h1><h3>Personal Information</h3><p><b>Name:</b> '+n+'</p>');
            pr.document.write('<h3>Education</h3><p>'+e+'</p><h3>Experience/Skills</h3><p>'+ex+'</p>');
            pr.document.write('</body></html>');
            pr.document.close();
            pr.print();
        }
    </script>
</body>
</html>
